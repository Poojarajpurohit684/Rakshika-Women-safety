services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: rakshika-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "0"
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: rakshika-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_GOOGLE_MAPS_KEY
        value: AIzaSyC7uDfaJQNCxeSMHystHYEad8dFelwhuwg
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
