services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: rakshika-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MOCK_MODE
        value: 0
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: CLIENT_ORIGIN
        sync: false          # set to your Render frontend URL
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: FALLBACK_ALERT_EMAIL
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: rakshika-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false          # set to your Render backend URL
      - key: VITE_MAPBOX_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
